platform:
  name: distributed-low-latency-trading-platform
  environment: local-sim

latency:
  stale_market_data_ns: 50000000
  heartbeat_timeout_ns: 250000000

risk:
  max_position: 10
  max_order_qty: 2
  max_notional: 1000000

nodes:
  market_data:
    node_id: 1
    cpu_core: 2

  strategy:
    node_id: 2
    cpu_core: 3

  oms:
    node_id: 3
    cpu_core: 4

  gateway:
    node_id: 4
    cpu_core: 5